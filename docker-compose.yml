  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    hostname: kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: "XYkLGdpzdGDeTFUrIPOE1g=="
    
    healthcheck:
      test: ["CMD-SHELL", "./opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5

    restart: always

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    depends_on:
      - kafka
    ports:
      - 8083:8080  
    environment:
      KAFKA_CLUSTERS_0_NAME: bigdata-kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: always

  # kafka-ui:
  #   image: provectuslabs/kafka-ui
  #   container_name: kafka-ui
  #   depends_on:
  #     - kafka
  #     - zookeeper
  #   ports:
  #     - "8080:8080"
  #   restart: always
  #   environment:
  #     KAFKA_CLUSTERS_0_NAME: bigdata-kafka-cluster
  #     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
  #     KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit    
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    image: fahadkalil/my-flink
    container_name: flink-jobmanager
    ports:
      - 8081:8081
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    command: jobmanager
  
  flink-taskmanager:
    image: fahadkalil/my-flink
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 16

  mongo:
    image: mongo:7.0
    container_name: mongo
    hostname: mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb

  mongo-express:
    image: mongo-express
    container_name: mongo-express-ui
    restart: always
    depends_on:
      - mongo
    ports:
      - 8082:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_REPLSET: rs0
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/?replicaSet=rs0
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass

  valkey:
    image: valkey/valkey:latest
    container_name: valkey-redis    
    hostname: valkey
    ports:
      - 6379:6379
    volumes:      
      - valkey_data:/data
    restart: always

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight-ui
    depends_on:
      - valkey    
    ports:
      - "5540:5540"
    environment:      
      RI_REDIS_HOST: valkey-redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: LocalConnection
    volumes:      
      - redisinsight_data:/data/db    
    restart: always

  postgres:
    image: postgres:17
    container_name: postgres    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postres
      POSTGRES_DB: bigdata
    ports:
      - "5434:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mongo_data:
  mongo_config:
  valkey_data:
  redisinsight_data:
  postgres_data: